services:
  ignite-node-1:
    build:
      context: .
      dockerfile_inline: |
        FROM apacheignite/ignite:2.18.0

        USER root

        RUN apk add --no-cache openjdk17-jre

        ENV JAVA_HOME=/usr/lib/jvm/java-17-openjdk
        ENV PATH=/usr/lib/jvm/java-17-openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    image: ignite-java17:2.18.0
    container_name: ignite-node-1
    environment:
      CONFIG_URI: /config/ignite-config.xml
      JVM_OPTS: >-
        -DIGNITE_QUIET=false
        --add-opens=java.base/java.nio=ALL-UNNAMED
        --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
        --add-opens=java.base/java.lang=ALL-UNNAMED
        --add-opens=java.base/java.lang.invoke=ALL-UNNAMED
        --add-opens=java.base/java.util=ALL-UNNAMED
        --add-opens=java.base/java.io=ALL-UNNAMED
        --add-opens=java.base/jdk.internal.misc=ALL-UNNAMED
    volumes:
      - ./config:/config:ro
      - ./ignite-libs/vector-index-common-1.0-SNAPSHOT.jar:/opt/ignite/apache-ignite/libs/vector-index-common-1.0-SNAPSHOT.jar:ro
      - ./ignite-libs/vector-index-node-1.0-SNAPSHOT.jar:/opt/ignite/apache-ignite/libs/vector-index-node-1.0-SNAPSHOT.jar:ro
      - ./ignite-libs/jvector-4.0.0-rc.8-hf1.jar:/opt/ignite/apache-ignite/libs/jvector-4.0.0-rc.8-hf1.jar:ro
      - ./ignite-libs/slf4j-api-2.0.16.jar:/opt/ignite/apache-ignite/libs/slf4j-api-2.0.16.jar:ro
      - ./ignite-libs/slf4j-simple-2.0.16.jar:/opt/ignite/apache-ignite/libs/slf4j-simple-2.0.16.jar:ro
      - ./ignite-libs/agrona-1.22.0.jar:/opt/ignite/apache-ignite/libs/agrona-1.22.0.jar:ro
    ports:
      - "10800:10800"
      - "47100:47100"
      - "47500:47500"
    networks:
      - ignite-net

  ignite-node-2:
    image: ignite-java17:2.18.0
    container_name: ignite-node-2
    environment:
      CONFIG_URI: /config/ignite-config.xml
      JVM_OPTS: >-
        --add-opens=java.base/java.nio=ALL-UNNAMED
        --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
        --add-opens=java.base/java.lang=ALL-UNNAMED
        --add-opens=java.base/java.lang.invoke=ALL-UNNAMED
        --add-opens=java.base/java.util=ALL-UNNAMED
        --add-opens=java.base/java.io=ALL-UNNAMED
        --add-opens=java.base/jdk.internal.misc=ALL-UNNAMED
    volumes:
      - ./config:/config:ro
      - ./ignite-libs/vector-index-common-1.0-SNAPSHOT.jar:/opt/ignite/apache-ignite/libs/vector-index-common-1.0-SNAPSHOT.jar:ro
      - ./ignite-libs/vector-index-node-1.0-SNAPSHOT.jar:/opt/ignite/apache-ignite/libs/vector-index-node-1.0-SNAPSHOT.jar:ro
      - ./ignite-libs/jvector-4.0.0-rc.8-hf1.jar:/opt/ignite/apache-ignite/libs/jvector-4.0.0-rc.8-hf1.jar:ro
      - ./ignite-libs/slf4j-api-2.0.16.jar:/opt/ignite/apache-ignite/libs/slf4j-api-2.0.16.jar:ro
      - ./ignite-libs/slf4j-simple-2.0.16.jar:/opt/ignite/apache-ignite/libs/slf4j-simple-2.0.16.jar:ro
      - ./ignite-libs/agrona-1.22.0.jar:/opt/ignite/apache-ignite/libs/agrona-1.22.0.jar:ro
    networks:
      - ignite-net
    depends_on:
      - ignite-node-1

networks:
  ignite-net:
    name: ignite-net
    driver: bridge