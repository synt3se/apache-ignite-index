version: '3.8'

services:
  ignite-node-1:
    image: apacheignite/ignite:2.18.0
    container_name: ignite-node-1
    environment:
      - CONFIG_URI=/config/ignite-config.xml
    volumes:
      - ./config:/config:ro
    ports:
      - "10800:10800"   # thin client
      - "47100:47100"   # communication SPI
      - "47500:47500"   # discovery SPI
    networks:
      - ignite-net

  ignite-node-2:
    image: apacheignite/ignite:2.18.0
    container_name: ignite-node-2
    environment:
      - CONFIG_URI=/config/ignite-config.xml
    volumes:
      - ./config:/config:ro
    networks:
      - ignite-net

networks:
  ignite-net:
    name: ignite-net
    driver: bridge
