server {
    listen 80;

    location = /vectors/stats {
        proxy_pass http://index-server:8081/vectors/stats;
    }

    location /search/ {
        proxy_pass http://gateway:8080;
        client_max_body_size 20m;       # multipart-фото из телеги
    }
    location /images {
        limit_except GET POST { deny all; }
        proxy_pass http://gateway:8080;
    }

    location / {
        return 404;
    }
}