server:
  port: 8080

# Адреса зависимых сервисов (переопределяются CLIP_URL / INDEX_URL).
clip:
  url: http://127.0.0.1:8000     # CLIP-сервис (Python, FastAPI)
index:
  url: http://127.0.0.1:8081     # Index-сервис (Java)

spring:
