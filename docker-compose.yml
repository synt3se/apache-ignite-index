x-java-opts: &java-opts >-
  --add-opens=java.base/jdk.internal.misc=ALL-UNNAMED
  --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
  --add-opens=java.base/java.io=ALL-UNNAMED
  --add-opens=java.base/java.nio=ALL-UNNAMED
  --add-opens=java.base/java.util=ALL-UNNAMED
  --add-opens=java.base/java.util.concurrent=ALL-UNNAMED
  --add-opens=java.base/java.lang=ALL-UNNAMED
  --add-opens=java.base/java.lang.invoke=ALL-UNNAMED
  --add-opens=java.management/sun.management=ALL-UNNAMED
  --add-opens=jdk.management/com.sun.management.internal=ALL-UNNAMED
  --add-exports=java.base/jdk.internal.misc=ALL-UNNAMED
  --add-exports=java.base/sun.nio.ch=ALL-UNNAMED
  --add-exports=java.management/com.sun.jmx.mbeanserver=ALL-UNNAMED
  --add-exports=jdk.internal.jvmstat/sun.jvmstat.monitor=ALL-UNNAMED
  --add-exports=java.base/sun.reflect.generics.reflectiveObjects=ALL-UNNAMED

x-node-common: &node-common
  restart: unless-stopped
  build:
    context: .
    target: ${NODE_TARGET:-ignite-node}     # ignite-node | ignite-node-21 - решение по SIMD в .env.example
  image: vindex-node:local
  environment:
    JAVA_TOOL_OPTIONS: *java-opts
    JVM_OPTS: ${NODE_JVM_OPTS}
  volumes:
    - ./docker/config/ignite-config.xml:/config/ignite-config.xml:ro
  healthcheck:
    test: ["CMD-SHELL", "nc -z 127.0.0.1 10800 || exit 1"]
    interval: 5s
    timeout: 3s
    retries: 30

services:
  ignite-node-1:
    <<: *node-common
    container_name: ignite-node-1
    volumes:
      - ./docker/config/ignite-config.xml:/config/ignite-config.xml:ro
      - ./jfr/node1:/jfr

  ignite-node-2:
    <<: *node-common
    container_name: ignite-node-2
    depends_on: [ ignite-node-1 ]
    volumes:
      - ./docker/config/ignite-config.xml:/config/ignite-config.xml:ro
      - ./jfr/node2:/jfr

  vector-server:
    restart: unless-stopped
    build: { context: ., target: vector-server }
    environment:
      IGNITE_ADDRESS: ignite-node-1:10800,ignite-node-2:10800
      JAVA_TOOL_OPTIONS: *java-opts
      JDK_JAVA_OPTIONS: "-XX:StartFlightRecording=filename=/jfr/server.jfr,dumponexit=true,disk=true,maxsize=200m,settings=profile"
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ./jfr:/jfr
    ports: ["8081:8081"]
    depends_on:
      ignite-node-1: { condition: service_healthy }
      ignite-node-2: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/vectors/stats >/dev/null || exit 1"]
      interval: 10s
      retries: 12

  clip:
    restart: unless-stopped
    build: { context: ., target: clip }
    # порт проверьте по clip_service.py (обычно 8000)

  gateway:
    restart: unless-stopped
    build: { context: ., target: gateway }
    depends_on:
      vector-server: { condition: service_healthy }
      clip: { condition: service_started }
    # env с адресами clip/vector-server — по вашим property

  bot:
    profiles: ["bot"]
    restart: unless-stopped
    build: { context: ., target: bot }
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      GATEWAY_URL: ${GATEWAY_URL:-http://gateway:8080}

  bench:
    profiles: ["bench"]
    build: { context: ., target: vector-server }   # тот же образ, другой main
    entrypoint: ["java","-Dloader.main=ru.nsu.fit.sberlab.vectorindex.vectorserver.benchmark.BenchmarkMain","-jar","/app/app.jar"]
    environment:
      IGNITE_ADDRESS: ignite-node-1:10800,ignite-node-2:10800

      DATABASE_PATH: /data/dataset.csv
      QUERIES_PATH: /data/quieries.csv
      RESULTS_PATH: /data/results.csv

      BENCHMARK_MODE: OUR_DATASET # ANN_BENCHMARK_TEST, OUR_DATASET, HIGH_LOAD, N_CLIENTS
      INDEX_MODE: BRUTE_FORCE # JVECTOR, BRUTE_FORCE
      LOAD_DATABASE: "true"
      HIGHLOAD_TARGET_RPS: "100"
      HIGHLOAD_TEST_SECONDS: "60"

      VINDEX_METRICS_ENABLED: "false"

      JAVA_TOOL_OPTIONS: *java-opts
    volumes:
      - ${DATA_DIR:-./data}:/data
    depends_on:
      ignite-node-1: { condition: service_healthy }
      ignite-node-2: { condition: service_healthy }

  prometheus:
    profiles: ["metrics"]
    image: prom/prometheus:v2.53.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    restart: unless-stopped

  grafana:
    profiles: ["metrics"]
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/vindex.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
    depends_on: ["prometheus"]
    restart: unless-stopped